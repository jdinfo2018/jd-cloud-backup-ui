<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40" role="img" aria-label="JD Cloud Backup">
  <defs>
    <linearGradient id="jdg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A73D9"/>
      <stop offset="1" stop-color="#0f57b0"/>
    </linearGradient>
  </defs>
  <!-- nuvem + seta de restauração (backup) -->
  <g transform="translate(2,4)">
    <path fill="url(#jdg)" d="M11 30a8 8 0 0 1-1-15.9A11 11 0 0 1 31 12.5 7.5 7.5 0 0 1 30 30z"/>
    <!-- seta circular (restore) em branco sobre a nuvem -->
    <path fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"
          d="M15 20a5.5 5.5 0 1 0 1.7-4"/>
    <path fill="#ffffff" d="M16.7 10.5l-1 5.5 5.3-1.6z"/>
  </g>
  <!-- wordmark -->
  <text x="46" y="19" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="17" font-weight="800" fill="#1A73D9">JD</text>
  <text x="70" y="19" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="17" font-weight="600" fill="#334155">Cloud</text>
  <text x="46" y="34" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" letter-spacing="3.5" fill="#64748b">BACKUP</text>
</svg>
